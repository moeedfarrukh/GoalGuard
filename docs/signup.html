<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - GoalGuard</title>
  <link rel="icon" href="./favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117;
      --card: #161B22;
      /* Light input background to match the new signin design */
      --input-bg: rgba(255, 255, 255, 0.15); 
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(255, 255, 255, 0.4); /* White focus border */
      --text: #E6EDF3;
      --text-dim: #8B949E;
      --orange: #FF5B04; /* Orange action color */
      --brand-blue: #1e40af; /* Deep blue for logo text */
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background glow */
    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* Logo & Header */
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      border: 2px solid var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff; /* White G */
      font-size: 14px;
      font-weight: 900;
    }

    .auth-title {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 18px 0 24px 0;
      color: var(--text-dim);
      font-size: 11px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider:not(:empty)::before { margin-right: 15px; }
    .divider:not(:empty)::after { margin-left: 15px; }

    /* Form Fields */
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-label {
      display: block;
      font-size: 12px;
      color: #ffffff; /* White label */
      margin-bottom: 8px;
      font-weight: 600;
      text-align: left;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.7); /* Brighter icon for light bar */
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .input-field {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px 14px 40px;
      color: #ffffff; /* White text */
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--border-focus);
      background: rgba(255, 255, 255, 0.2); 
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.5); 
    }

    /* Eye icon */
    .icon-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #ffffff; /* White icon */
      width: 16px;
      height: 16px;
      cursor: pointer;
      opacity: 0.6;
    }
    .icon-eye:hover { opacity: 1; }

    /* Primary Submit Button (Reduced Shine, matching signin) */
    .btn-submit {
      width: 100%;
      background: var(--orange); 
      color: #fff;
      border: none;
      border-radius: 99px; /* Pill shape */
      padding: 18px 48px; 
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 12px rgba(255, 91, 4, 0.15); /* Reduced shine */
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 91, 4, 0.25);
    }
    
    .btn-submit.disabled {
      opacity: 0.65;
      pointer-events: none;
    }

    /* Footer */
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Footer links */
    .auth-footer a {
      color: #ffffff; /* White link */
      text-decoration: none;
      font-weight: 700;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo">
        <div class="brand-icon">G</div>
        <span style="color:var(--brand-blue)">GOAL</span><span style="color:var(--orange)">GUARD</span>
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start tracking goals and building savings momentum.</p>
    </div>

    <div class="divider">continue with email</div>

    <form class="auth-form" id="signupForm">
      
      <div class="input-group">
        <label class="input-label" for="name">Full name</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <input id="name" type="text" class="input-field" placeholder="Your name" autocomplete="name" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          <input id="email" type="email" class="input-field" placeholder="you@example.com" autocomplete="email" required />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input id="password" type="password" class="input-field" placeholder="Create a password" autocomplete="new-password" minlength="6" required />
          <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </div>
      </div>
        
      <button type="submit" class="btn-submit" id="signupBtn">Sign Up</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="./signin.html">Sign in</a>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabaseClient.js";

    // ✅ IMPORTANT: DO NOT auto-redirect on page load.
    // User clicked "Sign up" so always show signup page.

    const form = document.getElementById("signupForm");
    const signupBtn = document.getElementById("signupBtn");

    // Added visual logic for the eye icon to match sign in page
    const eyeIcon = document.querySelector('.icon-eye');
    const passwordInput = document.getElementById('password');
    eyeIcon?.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.style.opacity = type === 'password' ? '0.6' : '1';
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      signupBtn.textContent = "Creating account...";
      signupBtn.classList.add("disabled");

      const email = document.getElementById("email").value.replace(/\s+/g, "").toLowerCase();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("name").value.trim();

      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: fullName ? { full_name: fullName } : {}
          }
        });

        console.log("SIGNUP DATA:", data);
        console.log("SIGNUP ERROR:", error);

        if (error) {
          alert(error.message);
          return;
        }

        // ✅ Your requirement: ALWAYS redirect to sign in after signup
        window.location.href = "./signin.html";

      } catch (err) {
        console.error("❌ signup crashed:", err);
        alert("Signup crashed — check console.");
      } finally {
        signupBtn.textContent = "Sign Up";
        signupBtn.classList.remove("disabled");
      }
    });
  </script>
</body>
</html>
